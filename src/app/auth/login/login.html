<div class="login-wrapper">
  <div class="login-card">
    
    <div class="brand-section">
      <div class="logo-box"></div>
      <h1 class="brand-name">FactuBélgica</h1>
    </div>

    <div class="welcome-text">
      <h2>Acceso al Panel</h2>
      <p>Ingresa tus credenciales administrativas</p>
    </div>

    <form class="login-form" (submit)="onLogin($event)">
      <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" [(ngModel)]="email" name="email" [class.has-error]="hasError" placeholder="admin@empresa.be" autocomplete="off">
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" [class.has-error]="hasError" placeholder="••••••••">
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox"> Recordar mi sesión
        </label>
        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
      </div>
      <button type="submit" class="btn-primary" [disabled]="isLoading" style="display: block; text-align: center; text-decoration: none; box-sizing: border-box; width: 100%;">
        {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
      </button>
    </form>

  </div>
</div>
